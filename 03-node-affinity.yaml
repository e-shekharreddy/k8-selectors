apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      # hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1c
            - us-east-1a
      # Soft Rule
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop
      - weight: 7
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - flipkart
  containers:
  - name: nginx
    image: nginx
  