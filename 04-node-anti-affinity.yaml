apiVersion: v1
kind: Pod
metadata:
  name: nginx-anti-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      # hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: NotIn
            values:
            - us-east-1c
      # # anti affinity
      # preferredDuringSchedulingIgnoredDuringExecution:
      # - weight: 10
      #   preference:
      #     matchExpressions:
      #     - key: project
      #       operator: NotIn
      #       values:
      #       - roboshop
      # - weight: 20
      #   preference:
      #     matchExpressions:
      #     - key: project
      #       operator: In
      #       values:
      #       - flipkart
  containers:
  - name: nginx
    image: nginx
  